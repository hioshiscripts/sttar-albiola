<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>sttar</title>
    <meta name="description" content="Sttar Albiola" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        /* ---------- reset & base ---------- */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg: #08090a;
            --card: rgba(255, 255, 255, .045);
            --card-border: rgba(255, 255, 255, .09);
            --text: #f1f1f2;
            --muted: #8b8d93;
            --muted-2: #616369;
            --line: rgba(255, 255, 255, .08);
            --ring-a: #ffffff;
            --ring-b: #3a3c40;
            --f-body: 'Manrope', sans-serif;
            --f-mono: 'JetBrains Mono', monospace;
        }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--f-body);
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: .01ms !important;
                animation-iteration-count: 1 !important;
                transition-duration: .01ms !important;
            }
        }

        /* ---------- backdrop ---------- */
        #bg {
            position: fixed;
            inset: 0;
            z-index: 0;
        }
        .vignette {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            background: radial-gradient(ellipse 70% 60% at 50% 40%, transparent 0%, rgba(0, 0, 0, .55) 100%);
        }

        /* ---------- click-to-enter gate ---------- */
        .gate {
            position: fixed;
            inset: 0;
            z-index: 50;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            cursor: pointer;
            transition: opacity .5s ease, visibility .5s ease;
        }
        .gate.hidden {
            opacity: 0;
            visibility: hidden;
            pointer-events: none;
        }
        .gate__text {
            font-family: var(--f-mono);
            font-size: 12px;
            letter-spacing: .25em;
            text-transform: uppercase;
            color: var(--muted);
            animation: gate-pulse 2s ease-in-out infinite;
        }
        @keyframes gate-pulse {
            0%,
            100% {
                opacity: .5;
            }
            50% {
                opacity: 1;
            }
        }

        /* ---------- card ---------- */
        .stage {
            position: relative;
            z-index: 2;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 32px 16px;
        }

        .card {
            width: 100%;
            max-width: 380px;
            background: var(--card);
            border: 1px solid var(--card-border);
            border-radius: 20px;
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            padding: 32px 24px 24px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, .5);
            opacity: 0;
            transform: translateY(14px);
            transition: opacity .6s ease, transform .6s ease;
        }
        .card.show {
            opacity: 1;
            transform: translateY(0);
        }

        /* avatar */
        .avatar {
            width: 88px;
            height: 88px;
            margin: 0 auto 16px;
            border-radius: 50%;
            padding: 3px;
            background: conic-gradient(from 0deg, var(--ring-a), var(--ring-b) 30%, var(--ring-b) 70%, var(--ring-a) 100%);
            animation: spin 5s linear infinite;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .avatar__inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: #131416;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 28px;
            letter-spacing: .02em;
            overflow: hidden;
        }
        .avatar__inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .name {
            font-weight: 800;
            font-size: 22px;
            letter-spacing: .01em;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        .name__badge {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
        }
        .name__badge svg {
            width: 100%;
            height: 100%;
            fill: #cfd3d8;
        }

        .handle {
            font-family: var(--f-mono);
            font-size: 12px;
            color: var(--muted-2);
            margin-top: 3px;
        }

        .status {
            margin-top: 12px;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 12.5px;
            color: var(--muted);
            background: rgba(255, 255, 255, .04);
            border: 1px solid var(--line);
            border-radius: 100px;
            padding: 5px 12px;
        }
        .status__dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            background: #9aa0a8;
            box-shadow: 0 0 6px #9aa0a8;
            animation: dot-blink 2s ease-in-out infinite;
        }
        @keyframes dot-blink {
            0%,
            100% {
                opacity: 1;
            }
            50% {
                opacity: .3;
            }
        }

        .divider {
            height: 1px;
            background: var(--line);
            margin: 20px 0;
        }

        /* tags */
        .tags {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 7px;
        }
        .tags__group-label {
            font-family: var(--f-mono);
            font-size: 9.5px;
            letter-spacing: .1em;
            text-transform: uppercase;
            color: var(--muted-2);
            margin: 0 0 8px;
            text-align: left;
        }
        .tag {
            font-size: 12px;
            font-weight: 500;
            color: var(--text);
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--line);
            border-radius: 8px;
            padding: 5px 10px;
            transition: border-color .2s ease, background .2s ease;
        }
        .tag:hover {
            border-color: rgba(255, 255, 255, .3);
            background: rgba(255, 255, 255, .08);
        }

        .tag-section {
            text-align: left;
            margin-bottom: 14px;
        }
        .tag-section:last-child {
            margin-bottom: 0;
        }

        /* icon grid */
        .icons {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        .icon-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            text-decoration: none;
            position: relative;
            transition: transform .18s ease, border-color .2s ease, background .2s ease;
        }
        .icon-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .09);
        }
        .icon-btn:active {
            transform: translateY(-1px) scale(.95);
        }
        .icon-btn svg {
            width: 18px;
            height: 18px;
            fill: #d3d5d9;
        }

        /* ---------- music player ---------- */
        .music-wrap {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            margin-top: 4px;
        }
        .music-btn {
            width: 42px;
            height: 42px;
            border-radius: 12px;
            background: rgba(255, 255, 255, .05);
            border: 1px solid var(--line);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform .18s ease, border-color .2s ease, background .2s ease;
            flex-shrink: 0;
        }
        .music-btn:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 255, 255, .35);
            background: rgba(255, 255, 255, .09);
        }
        .music-btn:active {
            transform: translateY(-1px) scale(.95);
        }
        .music-btn svg {
            width: 20px;
            height: 20px;
            fill: #d3d5d9;
            transition: fill .2s;
        }
        .music-btn.playing svg {
            fill: #8bc34a;
        }
        .music-label {
            font-family: var(--f-mono);
            font-size: 10px;
            letter-spacing: .06em;
            color: var(--muted-2);
            user-select: none;
            cursor: default;
        }
        .music-label span {
            color: var(--muted);
        }

        /* ---------- visits ---------- */
        .visits {
            margin-top: 22px;
            font-family: var(--f-mono);
            font-size: 10.5px;
            letter-spacing: .08em;
            color: var(--muted-2);
        }

        /* ---------- toast ---------- */
        .toast {
            position: fixed;
            left: 50%;
            bottom: 26px;
            transform: translateX(-50%) translateY(14px);
            background: #17181b;
            border: 1px solid var(--card-border);
            color: var(--text);
            font-family: var(--f-mono);
            font-size: 11.5px;
            letter-spacing: .05em;
            padding: 9px 16px;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            z-index: 60;
            transition: opacity .25s ease, transform .25s ease;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <!-- canvas backdrop -->
    <canvas id="bg"></canvas>
    <div class="vignette"></div>

    <!-- gate -->
    <div class="gate" id="gate">
        <span class="gate__text">click to enter</span>
    </div>

    <!-- main card -->
    <div class="stage">
        <div class="card" id="card">

            <!-- avatar -->
            <div class="avatar">
                <div class="avatar__inner" id="avatarInner">
                    <img src="avatar.jpg" alt="Sttar Albiola" onerror="this.remove(); document.getElementById('avatarInner').textContent = 'SA';" />
                </div>
            </div>

            <!-- name + handle -->
            <div class="name">
                Sttar Albiola
                <span class="name__badge">
                    <svg viewBox="0 0 24 24"><path d="M12 2 2 7v6c0 5 4 9.7 10 11 6-1.3 10-6 10-11V7zm-1.2 13.6L6.8 11.6l1.4-1.4 2.6 2.6 5.4-5.4 1.4 1.4z"/></svg>
                </span>
            </div>
            <div class="handle">@sttaralbiola</div>

            <!-- status -->
            <div class="status">
                <span class="status__dot"></span> always bored
            </div>

            <div class="divider"></div>

            <!-- sports -->
            <div class="tag-section">
                <div class="tags__group-label">sports</div>
                <div class="tags">
                    <span class="tag">Basketball</span>
                    <span class="tag">Soccer</span>
                </div>
            </div>

            <!-- games -->
            <div class="tag-section">
                <div class="tags__group-label">games</div>
                <div class="tags">
                    <span class="tag">MLBB</span>
                    <span class="tag">Roblox</span>
                    <span class="tag">Bloodstrike</span>
                    <span class="tag">CODM</span>
                </div>
            </div>

            <div class="divider"></div>

            <!-- social icons -->
            <div class="icons">
                <a class="icon-btn" href="https://www.facebook.com/sttaralbiola05" target="_blank" rel="noopener" aria-label="Facebook">
                    <svg viewBox="0 0 24 24"><path d="M14 9h3V5.5h-3C11.6 5.5 10 7.2 10 9.6V12H8v3h2v6h3v-6h2.6l.4-3H13V9.9c0-.6.4-.9 1-.9z"/></svg>
                </a>
                <a class="icon-btn" href="https://www.youtube.com/@Hioshi-Scripts" target="_blank" rel="noopener" aria-label="YouTube">
                    <svg viewBox="0 0 24 24"><path d="M21.6 7.2s-.2-1.5-.8-2.1c-.8-.8-1.7-.8-2.1-.9C15.9 4 12 4 12 4h0s-3.9 0-6.7.2c-.4 0-1.3.1-2.1.9-.6.6-.8 2.1-.8 2.1S2.2 9 2.2 10.7v1.6C2.2 14 2.4 15.8 2.4 15.8s.2 1.5.8 2.1c.8.8 1.9.8 2.3.9 1.7.1 7.5.2 7.5.2s3.9 0 6.7-.2c.4 0 1.3-.1 2.1-.9.6-.6.8-2.1.8-2.1s.2-1.8.2-3.5v-1.6c0-1.7-.2-3.5-.2-3.5zM9.9 14.6V8.9l5.4 2.9-5.4 2.8z"/></svg>
                </a>
                <button class="icon-btn" data-copy="sttar_albiola" aria-label="Copy Discord username">
                    <svg viewBox="0 0 24 24"><path d="M18.9 5.7A15.6 15.6 0 0 0 15.3 4.6c-.2.3-.4.7-.5 1a14.6 14.6 0 0 0-4.4 0c-.1-.3-.3-.7-.5-1-1.3.2-2.5.6-3.6 1.1C4 8.9 3.4 12 3.6 15.1c1.5 1.1 3 1.8 4.4 2.2.4-.5.7-1 1-1.6-.5-.2-1-.5-1.5-.8l.4-.3c2.9 1.3 6 1.3 8.8 0l.4.3c-.5.3-1 .6-1.5.8.3.6.6 1.1 1 1.6 1.5-.4 3-1.1 4.4-2.2.3-3.6-.6-6.7-2.1-9.4zM9.7 13.3c-.9 0-1.6-.8-1.6-1.7 0-1 .7-1.7 1.6-1.7s1.6.8 1.6 1.7c0 1-.7 1.7-1.6 1.7zm4.6 0c-.9 0-1.6-.8-1.6-1.7 0-1 .7-1.7 1.6-1.7s1.6.8 1.6 1.7c0 1-.7 1.7-1.6 1.7z"/></svg>
                </button>
                <a class="icon-btn" href="https://www.roblox.com/users/1489380637/profile" target="_blank" rel="noopener" aria-label="Roblox">
                    <svg viewBox="0 0 24 24"><path d="M6.2 3.8 3.8 17.8l14 2.4 2.4-14zM8.9 8.9l6.2 1-1 6.2-6.2-1z"/></svg>
                </a>
                <button class="icon-btn" data-copy="335646092" aria-label="Copy Mobile Legends ID">
                    <svg viewBox="0 0 24 24"><path d="M12 2 3 6.5v6c0 5 3.8 8.5 9 9.5 5.2-1 9-4.5 9-9.5v-6zm0 3.3 6.5 3.2v3.9c0 3.5-2.6 6-6.5 6.9-3.9-.9-6.5-3.4-6.5-6.9V8.5z"/></svg>
                </button>
            </div>

            <!-- music player -->
            <div class="divider"></div>

            <div class="music-wrap">
                <button class="music-btn" id="musicToggle" aria-label="Toggle background music">
                    <svg viewBox="0 0 24 24" id="musicIcon">
                        <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                    </svg>

                <span class="music-label">bg music <span id="musicStatus">off</span></span>

        </div>

    <!-- toast -->
    <div class="toast" id="toast">copied</div>

    <!-- hidden audio -->
    <audio id="bgAudio" loop preload="auto">
        <!--
        ═══════════════════════════════════════════════════════════════
        HOW TO ADD YOUR OWN BACKGROUND MUSIC:
        ───────────────────────────────────────────────────────────────
        1. Replace "your-music.mp3" with the path to your audio file.
        2. Supported formats: MP3, WAV, OGG, AAC.
        3. For best compatibility, use MP3.

        Example:
        <source src="music/song.mp3" type="audio/mpeg" />

        Want to use a YouTube video as background music?
        Use a tool like "yt-dlp" or online converters to download
        the audio as MP3, then place it in your project folder.
        ═══════════════════════════════════════════════════════════════
        -->
        <source src="your-music.mp3" type="audio/mpeg" />
        <!-- fallback: if the browser doesn't support MP3 -->
        <source src="your-music.ogg" type="audio/ogg" />
        Your browser does not support the audio element.
    </audio>

    <script>
        /* ---------- particles ---------- */
        (function particles() {
            const canvas = document.getElementById('bg');
            const ctx = canvas.getContext('2d');
            let w, h, dots = [];
            const reduceMotion = window.matchMedia('(prefers-reduced-motion: reduce)').matches;

            function resize() {
                w = canvas.width = innerWidth;
                h = canvas.height = innerHeight;
            }
            addEventListener('resize', resize);
            resize();

            const COUNT = Math.min(60, Math.floor((w * h) / 26000));
            for (let i = 0; i < COUNT; i++) {
                dots.push({
                    x: Math.random() * w,
                    y: Math.random() * h,
                    r: Math.random() * 1.4 + 0.3,
                    vy: Math.random() * 0.12 + 0.02,
                    a: Math.random() * 0.35 + 0.05
                });
            }

            function tick() {
                ctx.clearRect(0, 0, w, h);
                for (const d of dots) {
                    d.y -= d.vy;
                    if (d.y < -4) { d.y = h + 4;
                        d.x = Math.random() * w; }
                    ctx.beginPath();
                    ctx.arc(d.x, d.y, d.r, 0, Math.PI * 2);
                    ctx.fillStyle = `rgba(255,255,255,${d.a})`;
                    ctx.fill();
                }
                if (!reduceMotion) requestAnimationFrame(tick);
            }
            tick();
        })();

        /* ---------- gate ---------- */
        document.getElementById('gate').addEventListener('click', function() {
            this.classList.add('hidden');
            document.getElementById('card').classList.add('show');
        });

        /* ---------- visits ---------- */
        (function visits() {
            let count = 1;
            try {
                count = parseInt(localStorage.getItem('sttar_visits') || '0', 10) + 1;
                localStorage.setItem('sttar_visits', count);
            } catch (e) {}
            document.getElementById('visits').textContent = `${count} visit${count === 1 ? '' : 's'} (this device)`;
        })();

        /* ---------- copy buttons ---------- */
        (function copyButtons() {
            const toast = document.getElementById('toast');
            let t;

            function showToast() {
                toast.classList.add('show');
                clearTimeout(t);
                t = setTimeout(() => toast.classList.remove('show'), 1400);
            }
            document.querySelectorAll('[data-copy]').forEach(btn => {
                btn.addEventListener('click', async () => {
                    const value = btn.getAttribute('data-copy');
                    try {
                        await navigator.clipboard.writeText(value);
                        showToast();
                    } catch (e) {
                        const ta = document.createElement('textarea');
                        ta.value = value;
                        ta.style.position = 'fixed';
                        ta.style.opacity = '0';
                        document.body.appendChild(ta);
                        ta.select();
                        document.execCommand('copy');
                        document.body.removeChild(ta);
                        showToast();
                    }
                });
            });
        })();

        /* ---------- background music player ---------- */
        (function musicPlayer() {
            const audio = document.getElementById('bgAudio');
            const toggleBtn = document.getElementById('musicToggle');
            const statusLabel = document.getElementById('musicStatus');
            const icon = document.getElementById('musicIcon');

            let isPlaying = false;

            // try to autoplay on user interaction (gate click)
            document.getElementById('gate').addEventListener('click', function() {
                // attempt to resume audio context (for Chrome autoplay policy)
                if (audio) {
                    audio.play().catch(() => {});
                }
            }, { once: false });

            function toggleMusic() {
                if (!audio) return;
                if (isPlaying) {
                    audio.pause();
                    isPlaying = false;
                    toggleBtn.classList.remove('playing');
                    statusLabel.textContent = 'off';
                    // change icon back to "play" style (music note)
                    icon.setAttribute('d',
                        'M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'
                        );
                } else {
                    audio.play().then(() => {
                        isPlaying = true;
                        toggleBtn.classList.add('playing');
                        statusLabel.textContent = 'on ♪';
                        // change icon to "pause" style (two vertical bars)
                        icon.setAttribute('d',
                            'M6 4h4v16H6V4zm8 0h4v16h-4V4z'
                            );
                    }).catch(() => {
                        // play failed (e.g. no user interaction yet)
                        statusLabel.textContent = 'blocked';
                        setTimeout(() => {
                            if (!isPlaying) statusLabel.textContent = 'off';
                        }, 1200);
                    });
                }
            }

            toggleBtn.addEventListener('click', toggleMusic);

            // when audio ends naturally, reset UI
            audio.addEventListener('ended', () => {
                if (isPlaying) {
                    isPlaying = false;
                    toggleBtn.classList.remove('playing');
                    statusLabel.textContent = 'off';
                    icon.setAttribute('d',
                        'M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z'
                        );
                }
            });

            // if audio fails to load, show a hint
            audio.addEventListener('error', () => {
                statusLabel.textContent = 'no file';
                toggleBtn.style.opacity = '0.4';
                toggleBtn.style.cursor = 'default';
            });
        })();
    </script>

</body>
</html>
